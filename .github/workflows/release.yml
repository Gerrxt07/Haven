name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2026.4.18). Leave empty to use package.json version.'
        required: false
        type: string

jobs:
  check-version:
    name: Check if Release Exists
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Get package.json version
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Check GitHub Releases
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Try to view the release for this version tag
          if gh release view "v${{ steps.get_version.outputs.version }}" > /dev/null 2>&1; then
            echo "Release v${{ steps.get_version.outputs.version }} already exists. Skipping build."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Release v${{ steps.get_version.outputs.version }} does not exist. Proceeding with build."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    name: Build & Package (${{ matrix.os }})
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
      HAVEN_RELEASE_CHANNEL: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build application bundle
        run: bun run build

      - name: Run protection pipeline
        run: bun run protect

      - name: Package for Windows
        if: matrix.os == 'windows-latest'
        run: bunx electron-builder --win --publish never

      - name: Package for Linux
        if: matrix.os == 'ubuntu-latest'
        run: bunx electron-builder --linux --publish never

      - name: Package for MacOS
        if: matrix.os == 'macos-latest'
        run: bunx electron-builder --mac --publish never

      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Release v${{ needs.check-version.outputs.version }}
          files: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.zip
            release/*.yml
            release/*.yaml
            release/*.blockmap
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
