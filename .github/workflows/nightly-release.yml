name: Nightly Release

on:
  schedule:
    # Runs at 02:00 AM every night
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows you to manually trigger the workflow from the GitHub UI for testing

jobs:
  check-version:
    name: Check if Release Exists
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Get package.json version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Check GitHub Releases
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Try to view the release for this nightly version tag
          if gh release view "v${{ steps.get_version.outputs.version }}-nightly" > /dev/null 2>&1; then
            echo "Release v${{ steps.get_version.outputs.version }}-nightly already exists. Skipping build."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Release v${{ steps.get_version.outputs.version }}-nightly does not exist. Proceeding with build."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    name: Build & Package (${{ matrix.os }})
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      matrix:
        # Build across all major OS automatically!
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build application bundle
        run: bun run build

      - name: Run protection pipeline
        run: bun run protect

      - name: Package for Windows
        if: matrix.os == 'windows-latest'
        run: bunx electron-builder --win --publish never

      - name: Package for Linux
        if: matrix.os == 'ubuntu-latest'
        run: bunx electron-builder --linux --publish never

      - name: Package for MacOS
        if: matrix.os == 'macos-latest'
        run: bunx electron-builder --mac --publish never

      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.check-version.outputs.version }}-nightly
          name: Nightly Build v${{ needs.check-version.outputs.version }}
          # Glob patterns point to where electron-builder dumps the installers as configured in package.json
          files: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.zip
            release/*.yml
            release/*.yaml
            release/*.blockmap
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}