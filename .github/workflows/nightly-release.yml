name: Nightly Release

on:
  schedule:
    # Runs at 02:00 AM every night
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows you to manually trigger the workflow from the GitHub UI for testing

jobs:
  check-version:
    name: Check if Release Exists
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      
      - name: Get package.json version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Check GitHub Releases
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Try to view the release for this nightly version tag
          if gh release view "v${{ steps.get_version.outputs.version }}-nightly" > /dev/null 2>&1; then
            echo "Release v${{ steps.get_version.outputs.version }}-nightly already exists. Skipping build."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Release v${{ steps.get_version.outputs.version }}-nightly does not exist. Proceeding with build."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    name: Build & Package (${{ matrix.os }})
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      matrix:
        # Build across all major OS automatically!
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: bun install

      - name: Verify TypeScript and Rust
        run: |
          bun run typecheck
          cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        run: bun run package:win

      - name: Build for Linux
        if: matrix.os == 'ubuntu-latest'
        run: bun run package:linux

      - name: Build for MacOS
        if: matrix.os == 'macos-latest'
        run: bun run package:mac

      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.check-version.outputs.version }}-nightly
          name: Nightly Build v${{ needs.check-version.outputs.version }}
          files: |
            release/*.exe
            release/*.msi
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.zip
            release/*.sig
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
